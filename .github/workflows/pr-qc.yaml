name: PR Quality Checks

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pull-requests: write

jobs:

  pr-checks:
    name: PR Quality Checks
    runs-on: ubuntu-latest
    container: obolibrary/odkfull:v1.6
    outputs:
      annotations_added: ${{ steps.fix.outputs.annotations_added }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      # --- ODK tests on the committed workspace ---
      - name: ODK tests (IRI ranges, consistency, SPARQL checks, OBO report)
        run: |
          cd src/ontology/
          make IMP=false PAT=false COMP=false MIR=false validate_idranges reason_test sparql_test robot_reports

      # --- Install pyshacl in isolated venv (ODK Python is externally managed) ---
      - name: Set up pyshacl venv
        run: |
          python3 -m venv /opt/pyshacl-venv
          /opt/pyshacl-venv/bin/pip install --quiet pyshacl rdflib

      # --- Merge + DL profile check ---
      - name: Merge and validate OWL DL profile
        run: |
          robot merge \
            --catalog src/ontology/catalog-v001.xml \
            --input src/ontology/pmdco-edit.owl \
            --output merged.ttl
          robot validate-profile --profile DL --input merged.ttl --output validation.txt \
            || { cat validation.txt; exit 1; }

      # --- Initial SHACL pass → auto-annotate component files ---
      - name: Run initial SHACL pass
        run: |
          trap 'E=$?; test $E -eq 1 && exit 0 || exit $E' EXIT
          /opt/pyshacl-venv/bin/python3 -m pyshacl \
            -f turtle --advanced \
            -s .github/workflow_resources/abox_quality_shacl.ttl \
            merged.ttl > shacl_initial.ttl
      - id: fix
        name: Add missing IAO_0000114 / IAO_0000117 to component files
        run: |
          trap - EXIT
          /opt/pyshacl-venv/bin/python3 scripts/fix_missing_annotations.py \
            src/ontology/components \
            --shacl-report shacl_initial.ttl | tee annotation_log.txt
          if grep -q "No missing annotations" annotation_log.txt; then
            echo "annotations_added=false" >> $GITHUB_OUTPUT
          else
            echo "annotations_added=true" >> $GITHUB_OUTPUT
          fi
      - name: Upload patched component files
        uses: actions/upload-artifact@v4
        with:
          name: patched-components
          path: src/ontology/components/
          retention-days: 1

      # --- Final SHACL on patched+merged ontology ---
      - name: Merge patched ontology for SHACL
        run: |
          robot merge \
            --catalog src/ontology/catalog-v001.xml \
            --input src/ontology/pmdco-edit.owl \
            --output pmdco-merged.ttl
      - name: Run SHACL validation
        run: |
          trap 'E=$?; test $E -eq 1 && echo "trapped exit code 1" && exit 0 || exit $E' EXIT
          /opt/pyshacl-venv/bin/python3 -m pyshacl \
            -f turtle --advanced \
            -s .github/workflow_resources/abox_quality_shacl.ttl \
            pmdco-merged.ttl > shacl_report.ttl
      - name: Check for violations (errors only, PMDco terms only)
        run: |
          trap - EXIT
          /opt/pyshacl-venv/bin/python3 scripts/check_shacl_violations.py shacl_report.ttl
      - name: Generate and render SHACL reports
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          robot query --input shacl_report.ttl \
            --query .github/workflow_resources/q_listValidationResults.sparql ValidationReport.csv
          robot query --input shacl_report.ttl \
            --query .github/workflow_resources/q_countValidationResults.sparql ValidationSummary.csv
          /opt/pyshacl-venv/bin/python3 - <<'EOF'
          import csv, os, subprocess

          def csv_to_md(path, fallback):
              try:
                  rows = list(csv.reader(open(path)))
              except FileNotFoundError:
                  return fallback
              if len(rows) < 2:
                  return "_No violations found — all terms conform._"
              header = "| " + " | ".join(rows[0]) + " |\n"
              sep    = "| " + " | ".join(["---"] * len(rows[0])) + " |\n"
              body   = "".join("| " + " | ".join(r) + " |\n" for r in rows[1:])
              return header + sep + body

          summary_md = csv_to_md("ValidationSummary.csv", "_Summary not available._")
          report_md  = csv_to_md("ValidationReport.csv",  "_Report not available._")

          md = f"""## SHACL Validation Results

          ### Summary
          {summary_md}
          <details><summary>Full violation list</summary>

          {report_md}
          </details>
          """

          with open(os.environ["GITHUB_STEP_SUMMARY"], "a") as f:
              f.write(md)

          marker = "<!-- shacl-validation-report -->"
          body = marker + "\n" + md
          pr = os.environ.get("GITHUB_REF", "").replace("refs/pull/", "").replace("/merge", "")
          if pr.isdigit():
              repo = os.environ["GITHUB_REPOSITORY"]
              result = subprocess.run(
                  ["gh", "api", f"repos/{repo}/issues/{pr}/comments", "--jq",
                   f'[.[] | select(.body | startswith("{marker}")) | .id][0]'],
                  capture_output=True, text=True
              )
              comment_id = result.stdout.strip()
              if comment_id and comment_id != "null":
                  subprocess.run(["gh", "api", f"repos/{repo}/issues/comments/{comment_id}",
                                  "-X", "PATCH", "-f", f"body={body}"], check=True)
              else:
                  subprocess.run(["gh", "pr", "comment", pr, "--repo", repo,
                                  "--body", body], check=True)
          EOF
      - name: Archive validation reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation_reports
          path: |
            ValidationReport.csv
            ValidationSummary.csv

  commit-annotations:
    name: Commit annotation fixes
    needs: pr-checks
    if: |
      needs.pr-checks.outputs.annotations_added == 'true' &&
      needs.pr-checks.result == 'success' &&
      github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      contents: write
      statuses: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Apply patched component files
        uses: actions/download-artifact@v4
        with:
          name: patched-components
          path: src/ontology/components/
      - name: Commit and push
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add src/ontology/components/
          git diff --cached --quiet && echo "Nothing to commit." || \
            git commit -m "chore: auto-fill missing IAO_0000114/IAO_0000117 annotations"
          git push
      - name: Forward check status to new commit
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NEW_SHA=$(git rev-parse HEAD)
          gh api repos/${{ github.repository }}/statuses/$NEW_SHA \
            -f state=success \
            -f context="PR Quality Checks / pr-checks" \
            -f description="All checks passed (annotations auto-filled)" \
            -f target_url="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
