name: PR Quality Checks

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:

  auto-annotate:
    name: Auto-fill missing IAO annotations
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - name: Install Python dependencies
        run: pip install pyshacl rdflib
      - name: Download ROBOT
        run: curl -L -o robot.jar "https://github.com/ontodev/robot/releases/latest/download/robot.jar"
      - name: Merge and reason
        run: |
          java -jar robot.jar merge \
            --catalog src/ontology/catalog-v001.xml \
            --input src/ontology/pmdco-edit.owl \
            --output merged.ttl
          java -jar robot.jar reason \
            --reasoner elk \
            --input merged.ttl \
            --output reasoned.ttl
      - name: Run initial SHACL pass
        run: |
          trap 'E=$?; test $E -eq 1 && exit 0 || exit $E' EXIT
          python3 -m pyshacl \
            -f turtle \
            --advanced \
            -s .github/workflow_resources/abox_quality_shacl.ttl \
            reasoned.ttl > shacl_initial.ttl
      - id: fix
        name: Add missing IAO_0000114 / IAO_0000117 to component files
        run: |
          trap - EXIT
          python3 scripts/fix_missing_annotations.py \
            src/ontology/components \
            --shacl-report shacl_initial.ttl | tee annotation_log.txt
          if grep -q "No missing annotations" annotation_log.txt; then
            echo "annotations_added=false" >> $GITHUB_OUTPUT
          else
            echo "annotations_added=true" >> $GITHUB_OUTPUT
          fi
      - name: Upload patched component files
        uses: actions/upload-artifact@v4
        with:
          name: patched-components
          path: src/ontology/components/
          retention-days: 1
      - name: Fail if annotations were auto-filled (please commit them)
        if: steps.fix.outputs.annotations_added == 'true'
        run: |
          echo "::error::Missing IAO_0000114/IAO_0000117 annotations were detected and auto-filled."
          echo "::error::Please run the following locally and commit the result before pushing:"
          echo "::error::  pip install pyshacl rdflib"
          echo "::error::  python3 scripts/fix_missing_annotations.py src/ontology/components"
          cat annotation_log.txt
          exit 1

  odk-make-test:
    name: ODK make test
    needs: auto-annotate
    if: always()
    runs-on: ubuntu-latest
    container: obolibrary/odkfull:v1.6
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - name: Apply patched component files
        uses: actions/download-artifact@v4
        with:
          name: patched-components
          path: src/ontology/components/
      - name: make test_fast
        run: |
          cd src/ontology/
          make test_fast

  annotation-shacl:
    name: Annotation standard SHACL
    needs: auto-annotate
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          path: main
      - name: Apply patched component files
        uses: actions/download-artifact@v4
        with:
          name: patched-components
          path: main/src/ontology/components/
      - name: Merge and reason
        run: |
          curl -L -o robot.jar "https://github.com/ontodev/robot/releases/latest/download/robot.jar"
          java -jar robot.jar merge --catalog main/src/ontology/catalog-v001.xml --input main/src/ontology/pmdco-edit.owl --output pmd-core-merged.ttl
          java -jar robot.jar reason --reasoner elk --input pmd-core-merged.ttl --output pmd-core-reasoned.ttl
      - name: pyshacl
        run: |
          pip install pyshacl
          trap 'E=$?; test $E -eq 1 && echo "trapped exit code 1" && exit 0 || exit $E' EXIT
          python3 -m pyshacl -f turtle --advanced -s main/.github/workflow_resources/abox_quality_shacl.ttl pmd-core-reasoned.ttl > shacl_report.ttl
      - name: Check for violations (errors only, PMDco terms only)
        run: |
          trap - EXIT
          python3 main/scripts/check_shacl_violations.py shacl_report.ttl
      - name: Generate validation reports
        if: always()
        run: |
          java -jar robot.jar query --input shacl_report.ttl --query main/.github/workflow_resources/q_listValidationResults.sparql ValidationReport.csv
          java -jar robot.jar query --input shacl_report.ttl --query main/.github/workflow_resources/q_countValidationResults.sparql ValidationSummary.csv
      - name: Archive validation reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation_reports
          path: |
            ValidationReport.csv
            ValidationSummary.csv
